apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  namespace: microservices-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adservice
  template:
    metadata:
      labels:
        app: adservice
    spec:
      containers:
        - name: adservice
          image: microservices-demo/adservice:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "9555"
            - name: COLLECTOR_SERVICE_ADDR
              value: otel-collector:4317
          ports:
            - name: grpc
              containerPort: 9555
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: adservice
  namespace: microservices-demo
spec:
  selector:
    app: adservice
  ports:
    - name: grpc
      port: 9555
      targetPort: 9555
      appProtocol: grpc
---
