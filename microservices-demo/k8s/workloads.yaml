            - name: ALLOYDB_TABLE_NAME
              value: replace-me
            - name: ALLOYDB_CLUSTER_NAME
              value: replace-me
            - name: ALLOYDB_INSTANCE_NAME
              value: replace-me
            - name: ALLOYDB_SECRET_NAME
              value: replace-me
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
