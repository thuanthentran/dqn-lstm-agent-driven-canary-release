apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
  namespace: microservices-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgenerator
  template:
    metadata:
      labels:
        app: loadgenerator
    spec:
      containers:
        - name: loadgenerator
          image: microservices-demo/loadgenerator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: FRONTEND_ADDR
              value: frontend:8080
            - name: USERS
              value: "10"
            - name: RATE
              value: "1"
