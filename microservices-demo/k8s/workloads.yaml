          image: microservices-demo/shoppingassistantservice:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: PROJECT_ID
              value: replace-me
            - name: ALLOYDB_DATABASE_NAME
