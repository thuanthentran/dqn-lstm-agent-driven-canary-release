apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: {{ .Values.serviceName }}-dr
spec:
  host: {{ .Values.serviceName }}
  subsets:
  - name: stable
  - name: canary
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ .Values.serviceName }}-vsvc
spec:
  hosts:
  - {{ .Values.serviceName }}
  http:
  - name: primary-route
    route:
    - destination:
        host: {{ .Values.serviceName }}
        subset: stable
      weight: 100
    - destination:
        host: {{ .Values.serviceName }}
        subset: canary
      weight: 0