apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  # Tên Rollout sẽ tự động lấy theo tên service (vd: paymentservice)
  name: {{ .Values.serviceName }}
spec:
  # Tự động lấy số lượng replicas gán tĩnh từ file values (Ví dụ: 5 pods)
  replicas: {{ .Values.replicas | default 1 }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: {{ .Values.serviceName }}
  
  template:
    metadata:
      labels:
        app: {{ .Values.serviceName }}
      {{- if .Values.podAnnotations }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      {{- end }}
    spec:
      containers:
      - name: server
        image: {{ .Values.image }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.containerPort }}
        {{- if .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        {{- end }}
        env:
        {{- range .Values.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }} # <--- Chỉ giữ lại 1 end này cho vòng lặp range

  strategy:
    canary:
      canaryService: {{ .Values.serviceName }}-canary
      stableService: {{ .Values.serviceName }}-stable
      
      # PATCH: Chuyển từ Gateway API sang SMI cho Linkerd
      trafficRouting:
        smi:
          rootService: {{ .Values.serviceName }}
          trafficSplitName: {{ .Values.serviceName }}-split
            
      steps:
      {{- if eq .Values.envNamespace "prod" }}
      # ===============================================
      # PROD NAMESPACE STEPS
      # ===============================================
      - setWeight: 1
      - pause: {} # Chờ đồng bộ từ Twin (qua Sync Controller)
      - setWeight: 20
      - pause: {duration: 60s} # Prod tự do đánh giá tiếp nhưng an toàn hơn vì Twin đã pass
      - setWeight: 50
      - pause: {duration: 60s}
      - setWeight: 100
      {{- else if eq .Values.envNamespace "twin" }}
      # ===============================================
      # TWIN NAMESPACE STEPS
      # ===============================================
      - setWeight: 20
      - analysis:
          templates:
          - templateName: {{ .Values.serviceName }}-eval
          # Chạy song song Stress Test Job
          - templateName: {{ .Values.serviceName }}-loadtest
          args:
          - name: service-name
            value: {{ .Values.serviceName }}
          - name: stable-hash
            valueFrom:
              podTemplateHashValue: Stable
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
          - name: target-weight
            value: "20"
      - setWeight: 50
      - analysis:
          templates:
          - templateName: {{ .Values.serviceName }}-eval
          args:
          - name: service-name
            value: {{ .Values.serviceName }}
          - name: stable-hash
            valueFrom:
              podTemplateHashValue: Stable
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
          - name: target-weight
            value: "50"
      - setWeight: 80
      - analysis:
          templates:
          - templateName: {{ .Values.serviceName }}-eval
          args:
          - name: service-name
            value: {{ .Values.serviceName }}
          - name: stable-hash
            valueFrom:
              podTemplateHashValue: Stable
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
          - name: target-weight
            value: "80"
      {{- else }}
      # ===============================================
      # DEFAULT STEPS
      # ===============================================
      - setWeight: 50
      - pause: {duration: 30s}
      {{- end }}