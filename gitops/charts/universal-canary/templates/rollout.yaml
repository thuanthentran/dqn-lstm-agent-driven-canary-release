apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  # Tên Rollout sẽ tự động lấy theo tên service (vd: paymentservice)
  name: {{ .Values.serviceName }}
  namespace: default
spec:
  # Tự động lấy số lượng replicas gán tĩnh từ file values (Ví dụ: 5 pods)
  replicas: {{ .Values.replicas | default 1 }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: {{ .Values.serviceName }}
  
  template:
    metadata:
      labels:
        app: {{ .Values.serviceName }}
      {{- if .Values.podAnnotations }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      {{- end }}
    spec:
      containers:
      - name: server
        image: {{ .Values.image }}
        ports:
        - containerPort: {{ .Values.containerPort }}
        {{- if .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        {{- end }}
        env:
        {{- range .Values.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }} # <--- Chỉ giữ lại 1 end này cho vòng lặp range

  strategy:
    canary:
      # Hai service đóng vai trò "chốt chặn" cho Istio
      canaryService: {{ .Values.serviceName }}-canary
      stableService: {{ .Values.serviceName }}-stable
      
      # Bàn giao quyền bẻ traffic cho Istio
      trafficRouting:
        istio:
          virtualService:
            name: {{ .Values.serviceName }}-vsvc
            routes:
            - primary-route
          destinationRule:
            name: {{ .Values.serviceName }}-dr
            canarySubsetName: canary
            stableSubsetName: stable
            
      # KỊCH BẢN PHÁT HÀNH (Steps) - Gọi tới PPO Agent
      steps:
      # --- BƯỚC 1: Thăm dò 20% ---
      - setWeight: 20
      - pause: {}

      # --- BƯỚC 2: Tăng tốc 50% ---
      - setWeight: 50
      - pause: {}         

      # --- BƯỚC 3: Mở rộng 80% ---
      - setWeight: 80
      - pause: {}