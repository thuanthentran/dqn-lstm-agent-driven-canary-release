# gitops/charts/universal-canary/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.serviceName }}-route
  namespace: default
spec:
  parentRefs:
  - kind: Gateway
    name: {{ .Values.serviceName }}-gateway # <--- TRỎ ĐÚNG VÀO GATEWAY CỦA SERVICE ĐÓ
    namespace: default
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ .Values.serviceName }}-stable
      port: {{ .Values.containerPort }}
      weight: 100
    - name: {{ .Values.serviceName }}-canary
      port: {{ .Values.containerPort }}
      weight: 0