# gitops/charts/universal-canary/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.serviceName }}-route
  namespace: default
spec:
  parentRefs:
  - kind: Service
    name: {{ .Values.serviceName }}
    port: {{ .Values.containerPort }} # 5050
  rules:
  - timeouts:
      request: 3s # Ép timeout 3s để Agent học được lỗi hữu cơ
    backendRefs:
    - name: {{ .Values.serviceName }}-stable
      port: {{ .Values.containerPort }}
      weight: 100
    - name: {{ .Values.serviceName }}-canary
      port: {{ .Values.containerPort }}
      weight: 0