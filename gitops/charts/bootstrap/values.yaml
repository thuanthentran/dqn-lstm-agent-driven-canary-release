global:
  # Cập nhật lại Repo URL chính xác của bạn
  repoURL: 'https://github.com/thuanthentran/dqn-lstm-agent-driven-canary-release'
  targetRevision: linkerd
  destinationNamespace: default

services:
  - name: frontend
    chartPath: gitops/charts/universal-canary
    valueFile: ../../releases/frontend-values.yaml
    
  - name: service-a
    chartPath: gitops/charts/universal-canary
    valueFile: ../../releases/service-a-values.yaml
    
  - name: service-b
    chartPath: gitops/charts/universal-canary
    valueFile: ../../releases/service-b-values.yaml
    
  - name: service-c
    chartPath: gitops/charts/universal-canary
    valueFile: ../../releases/service-c-values.yaml
    
  - name: base-resources
    chartPath: gitops/base