serviceName: recommendationservice
replicas: 1
image: ghcr.io/thuanthentran/recommendationservice:latest
containerPort: 8080
env:
  - name: PORT
    value: "8080"
  - name: PRODUCT_CATALOG_SERVICE_ADDR
    value: "cilium-gateway-productcatalogservice-gateway:80"
  - name: DISABLE_PROFILER
    value: "1"