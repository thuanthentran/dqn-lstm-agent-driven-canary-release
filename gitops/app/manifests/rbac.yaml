apiVersion: v1
kind: ServiceAccount
metadata:
  name: canary-ai-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: canary-ai-agent-rollout-reader
  namespace: default
rules:
- apiGroups:
  - argoproj.io
  resources:
  - rollouts
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: canary-ai-agent-rollout-reader
  namespace: default
subjects:
- kind: ServiceAccount
  name: canary-ai-agent
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: canary-ai-agent-rollout-reader
