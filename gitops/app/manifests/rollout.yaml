apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: my-app-release
  namespace: default
spec:
  replicas: 5
  # Số lượng pod cũ cần giữ lại khi rollout (thường để 25% hoặc 0 tùy chiến lược)
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      # Xóa images cũ khi pod terminate
      terminationGracePeriodSeconds: 30
      containers:
        - name: my-app
          image: ghcr.io/thuanthentran/dqn-lstm-agent-driven-canary-release/my-app:latest
          env:
            - name: APP_SCENARIO
              value: "healthy"
            - name: APP_VERSION
              value: "v1"
          ports:
            - name: http
              containerPort: 8080

  strategy:
    canary:
      dynamicStableScale: true
      maxSurge: 1
      maxUnavailable: 0
      canaryService: my-app-canary
      stableService: my-app-stable
      trafficRouting:
        nginx:
          stableIngress: my-app-ingress

      # XÓA block analysis global ở đây đi

      steps:
        - setWeight: 10
        - analysis:
            # AI giám sát mốc 10%
            templates:
              - templateName: ai-dqn-decision
            args:
              - name: rollout-name
                value: "my-app-v2"
              - name: target-weight
                value: "10"

        - setWeight: 30
        - analysis:
            # AI giám sát mốc 30%
            templates:
              - templateName: ai-dqn-decision
            args:
              - name: rollout-name
                value: "my-app-v2"
              - name: target-weight
                value: "30"

        - setWeight: 60
        - analysis:
            # AI giám sát mốc 60%
            templates:
              - templateName: ai-dqn-decision
            args:
              - name: rollout-name
                value: "my-app-v2"
              - name: target-weight
                value: "60"

        - setWeight: 100
